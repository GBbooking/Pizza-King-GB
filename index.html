<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Piza King GB</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
--bg:#f5f2ed;--surface:#fff;--surface2:#f0ece4;
--ink:#1a1714;--ink2:#5c5650;
--accent:#2d6a4f;--accent-light:#52b788;
--border:#e0d9ce;--radius:16px;
--shadow:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink)}
nav{position:sticky;top:0;background:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.nav-links{display:flex;gap:12px}
.nav-links a{text-decoration:none;color:var(--ink2)}
.shop{max-width:1200px;margin:auto;padding:20px;display:grid;grid-template-columns:1fr 320px;gap:20px}
@media(max-width:900px){.shop{grid-template-columns:1fr}.sidebar{position:fixed;bottom:0;left:0;right:0}}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:120px;object-fit:cover}
.card-body{padding:10px}
.price{color:var(--accent);font-weight:700}
button{cursor:pointer}
.add{background:var(--accent);color:#fff;border:none;padding:6px 10px;border-radius:8px}
.sidebar{background:#fff;padding:12px;border-radius:12px;border:1px solid var(--border)}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee}
input,textarea{width:100%;padding:8px;margin-top:5px;border:1px solid var(--border);border-radius:8px}
.btn-wa{width:100%;background:#25d366;color:#fff;border:none;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>
<body>

<nav>
<div><b>QuickMart</b></div>
<div class="nav-links">
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</div>
</nav>

<div class="shop">
<div>
<div class="products" id="products"></div>
</div>

<div class="sidebar">
<h3>Cart</h3>
<div id="cart"></div>
<hr/>
<input id="name" placeholder="Full Name"/>
<input id="phone" placeholder="Contact Number"/>
<textarea id="address" placeholder="Address"></textarea>
<button class="btn-wa" onclick="order()">Order WhatsApp</button>
</div>
</div>

<script>
const products=[
{id:1,name:"Wireless Earbuds",price:2500,img:"https://via.placeholder.com/300x200?text=Earbuds"},
{id:2,name:"Bluetooth Speaker",price:3200,img:"https://via.placeholder.com/300x200?text=Speaker"},
{id:3,name:"Power Bank",price:2800,img:"https://via.placeholder.com/300x200?text=PowerBank"},
{id:4,name:"Smart Watch",price:6000,img:"https://via.placeholder.com/300x200?text=Watch"}
];

let cart={};

function render(){
let p=document.getElementById('products');
p.innerHTML='';
products.forEach(i=>{
let d=document.createElement('div');
d.className='card';
d.innerHTML=`<img src='${i.img}'/><div class='card-body'><b>${i.name}</b><div class='price'>PKR ${i.price}</div><button class='add' onclick='add(${i.id})'>Add</button></div>`;
p.appendChild(d);
});
updateCart();
}

function add(id){cart[id]=(cart[id]||0)+1;updateCart();}
function remove(id){delete cart[id];updateCart();}

function updateCart(){
let c=document.getElementById('cart');c.innerHTML='';
Object.keys(cart).forEach(id=>{
let p=products.find(x=>x.id==id);
c.innerHTML+=`<div class='cart-item'>${p.name} x ${cart[id]} <button onclick='remove(${id})'>x</button></div>`;
});
}

function order(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;
let items=Object.keys(cart).map(id=>{
let p=products.find(x=>x.id==id);
return `${p.name} x ${cart[id]}`;
}).join('\n');

let msg=`Order:\n${name}\n${phone}\n${address}\n\n${items}`;
window.open('https://wa.me/92119264467?text='+encodeURIComponent(msg));
}

render();
</script>

</body>
</html>
